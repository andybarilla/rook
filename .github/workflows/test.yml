name: Test

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run tests
        run: go test ./internal/... ./cmd/rook/... ./test/... -timeout 60s

      - name: Vet
        run: go vet ./internal/... ./cmd/rook/... ./test/...
